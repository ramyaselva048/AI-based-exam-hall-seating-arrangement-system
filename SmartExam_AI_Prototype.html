<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartExam AI – Exam Hall Seating System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#253047;--surface3:#2d3f5f;
  --border:#334155;--border2:#475569;
  --accent:#6366f1;--accent2:#818cf8;--accent3:#a5b4fc;
  --neon:#22d3ee;--neon2:#67e8f9;
  --green:#10b981;--green2:#34d399;
  --amber:#f59e0b;--amber2:#fbbf24;
  --red:#ef4444;--red2:#f87171;
  --purple:#a855f7;--purple2:#c084fc;
  --pink:#ec4899;--pink2:#f472b6;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:250px;min-width:250px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);}
.logo h1{font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.logo h1 span{color:var(--accent2);}
.logo p{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--mono);}
.nav{padding:16px 10px;flex:1;overflow-y:auto;}
.nav-section{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:12px 10px 6px;}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:8px;border:none;background:none;color:var(--text2);font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;transition:all 0.15s;margin-bottom:3px;text-align:left;}
.nav-btn:hover{background:var(--surface2);color:var(--text);}
.nav-btn.active{background:rgba(99,102,241,0.15);color:var(--accent3);border:1px solid rgba(99,102,241,0.25);}
.nav-btn svg{width:16px;height:16px;flex-shrink:0;}
.sidebar-footer{padding:16px;border-top:1px solid var(--border);}
.status-pill{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.dot{width:7px;height:7px;border-radius:50%;}
.dot-green{background:var(--green);}
.dot-amber{background:var(--amber);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-left h2{font-size:18px;font-weight:700;}
.topbar-left p{font-size:11px;color:var(--text3);margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.badge{background:rgba(99,102,241,0.12);color:var(--accent3);border:1px solid rgba(99,102,241,0.25);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--mono);}
.content{flex:1;overflow-y:auto;padding:28px;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:all 0.15s;white-space:nowrap;}
.btn:disabled{opacity:0.35;cursor:not-allowed;}
.btn-primary{background:linear-gradient(135deg,#6366f1,#22d3ee);color:#fff;}
.btn-primary:hover:not(:disabled){opacity:0.88;transform:translateY(-1px);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover:not(:disabled){background:var(--surface3);}
.btn-green{background:rgba(16,185,129,0.12);color:var(--green2);border:1px solid rgba(16,185,129,0.25);}
.btn-green:hover:not(:disabled){background:rgba(16,185,129,0.22);}
.btn-amber{background:rgba(245,158,11,0.12);color:var(--amber2);border:1px solid rgba(245,158,11,0.25);}
.btn-amber:hover:not(:disabled){background:rgba(245,158,11,0.22);}
.btn-red{background:rgba(239,68,68,0.12);color:var(--red2);border:1px solid rgba(239,68,68,0.25);}
.btn-red:hover:not(:disabled){background:rgba(239,68,68,0.22);}
.btn-purple{background:rgba(168,85,247,0.12);color:var(--purple2);border:1px solid rgba(168,85,247,0.25);}
.btn-purple:hover:not(:disabled){background:rgba(168,85,247,0.22);}
.btn-sm{padding:7px 14px;font-size:12px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;}
.stat-glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:0.07;}
.stat-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}
.stat-value{font-size:34px;font-weight:800;font-family:var(--mono);line-height:1;}
.stat-sub{font-size:12px;color:var(--text2);margin-top:6px;}
.stat-emoji{position:absolute;top:16px;right:16px;font-size:22px;opacity:0.5;}
.upload-zone{border:2px dashed var(--border2);border-radius:12px;padding:44px 20px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;margin-bottom:16px;}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:rgba(99,102,241,0.04);}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:44px;margin-bottom:12px;}
.upload-title{font-size:15px;font-weight:700;margin-bottom:6px;}
.upload-sub{font-size:12px;color:var(--text3);}
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--surface2);}
th{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:11px 14px;text-align:left;}
td{font-size:13px;color:var(--text2);padding:10px 14px;border-top:1px solid rgba(51,65,85,0.4);}
tr:hover td{background:rgba(255,255,255,0.015);}
.reg-cell{color:var(--text);font-weight:600;font-family:var(--mono);}
.dept-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--mono);}
.alert{padding:12px 16px;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.alert-success{background:rgba(16,185,129,0.09);color:var(--green2);border:1px solid rgba(16,185,129,0.2);}
.alert-error{background:rgba(239,68,68,0.09);color:var(--red2);border:1px solid rgba(239,68,68,0.2);}
.alert-info{background:rgba(99,102,241,0.09);color:var(--accent3);border:1px solid rgba(99,102,241,0.2);}
.progress-bar{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--neon));transition:width 0.6s ease;}
.floor-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.floor-tab{padding:7px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text2);transition:all 0.15s;font-family:var(--font);}
.floor-tab:hover{border-color:var(--accent2);}
.floor-tab.active{background:rgba(99,102,241,0.15);color:var(--accent3);border-color:rgba(99,102,241,0.4);}
.floor-header{background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(34,211,238,0.04));border:1px solid rgba(99,102,241,0.15);border-radius:10px;padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:24px;}
.room-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all 0.15s;}
.room-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.room-card.selected{border-color:var(--neon);background:rgba(34,211,238,0.04);}
.room-id{font-size:13px;font-weight:800;color:var(--neon);font-family:var(--mono);margin-bottom:4px;}
.room-count{font-size:26px;font-weight:800;color:var(--text);font-family:var(--mono);line-height:1;}
.room-label{font-size:11px;color:var(--text3);margin-bottom:8px;}
.dept-dots{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px;}
.seat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px;}
.seat-cell{border-radius:7px;padding:10px 8px;text-align:center;border:1px solid;}
.seat-num-label{font-size:9px;color:var(--text3);font-family:var(--mono);margin-bottom:2px;}
.seat-reg-label{font-size:11px;font-weight:700;font-family:var(--mono);margin-bottom:2px;}
.seat-dept-label{font-size:10px;font-weight:600;}
.seat-name-label{font-size:10px;color:var(--text3);}
.seat-empty{background:var(--surface3);border-color:var(--border);opacity:0.4;}
.fairness-bar{height:22px;background:var(--surface3);border-radius:11px;overflow:hidden;margin:8px 0;}
.fairness-fill{height:100%;border-radius:11px;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-size:11px;font-weight:700;color:#fff;transition:width 1.2s cubic-bezier(0.4,0,0.2,1);}
.generating{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:18px;}
.gen-spinner{width:52px;height:52px;border:3px solid rgba(99,102,241,0.15);border-top-color:var(--accent);border-right-color:var(--neon);border-radius:50%;animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.divider{height:1px;background:var(--border);margin:22px 0;}
.section-title{font-size:15px;font-weight:700;margin-bottom:4px;}
.section-sub{font-size:12px;color:var(--text3);margin-bottom:18px;}
.empty-state{text-align:center;padding:70px 20px;}
.empty-icon{font-size:52px;margin-bottom:14px;}
.empty-title{font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.empty-sub{font-size:12px;color:var(--text3);margin-bottom:20px;}
.code-block{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:var(--mono);font-size:12px;color:var(--text2);line-height:1.7;}
.export-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.export-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;display:flex;flex-direction:column;gap:10px;}
.export-icon{font-size:32px;}
.export-title{font-size:14px;font-weight:700;}
.export-sub{font-size:12px;color:var(--text3);flex:1;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn 0.25s ease;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <h1>Smart<span>Exam</span> AI</h1>
      <p>Intelligent Seating System v2.0</p>
    </div>
    <nav class="nav">
      <div class="nav-section">Main</div>
      <button class="nav-btn active" onclick="go('dashboard')" id="nb-dashboard">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke-width="2"/></svg>
        Dashboard
      </button>
      <button class="nav-btn" onclick="go('upload')" id="nb-upload">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        Student Upload
      </button>
      <button class="nav-btn" onclick="go('seating')" id="nb-seating">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
        Seating Layout
      </button>
      <div class="nav-section">Analytics & Export</div>
      <button class="nav-btn" onclick="go('fairness')" id="nb-fairness">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        AI Fairness Score
      </button>
      <button class="nav-btn" onclick="go('export')" id="nb-export">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Export Center
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="status-pill"><div class="dot dot-green"></div><span>System Online</span></div>
      <div style="font-size:10px;color:var(--text3);margin-top:4px;font-family:var(--mono);">5 Floors · 50 Rooms · 2000 Cap</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <h2 id="page-title">Dashboard</h2>
        <p id="page-sub">SmartExam AI — Intelligent Exam Hall Seating System</p>
      </div>
      <div class="topbar-right">
        <span class="badge" id="topbar-badge">Ready</span>
        <button class="btn btn-primary btn-sm" onclick="generateSeating()">⚡ Generate AI Seating</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<script>
const FLOORS=5,ROOMS_PER_FLOOR=10,SEATS_PER_ROOM=40;
const TOTAL_ROOMS=FLOORS*ROOMS_PER_FLOOR,TOTAL_CAP=TOTAL_ROOMS*SEATS_PER_ROOM;
const DEPT_PALETTE={
  CSE:{bg:'rgba(99,102,241,0.12)',color:'#a5b4fc',border:'rgba(99,102,241,0.25)'},
  IT:{bg:'rgba(34,211,238,0.12)',color:'#67e8f9',border:'rgba(34,211,238,0.25)'},
  ECE:{bg:'rgba(16,185,129,0.12)',color:'#34d399',border:'rgba(16,185,129,0.25)'},
  MECH:{bg:'rgba(245,158,11,0.12)',color:'#fbbf24',border:'rgba(245,158,11,0.25)'},
  AI:{bg:'rgba(168,85,247,0.12)',color:'#c084fc',border:'rgba(168,85,247,0.25)'},
  EEE:{bg:'rgba(236,72,153,0.12)',color:'#f472b6',border:'rgba(236,72,153,0.25)'},
  CIVIL:{bg:'rgba(239,68,68,0.12)',color:'#f87171',border:'rgba(239,68,68,0.25)'},
  MBA:{bg:'rgba(14,165,233,0.12)',color:'#38bdf8',border:'rgba(14,165,233,0.25)'},
  MCA:{bg:'rgba(132,204,22,0.12)',color:'#a3e635',border:'rgba(132,204,22,0.25)'},
  DEFAULT:{bg:'rgba(148,163,184,0.12)',color:'#94a3b8',border:'rgba(148,163,184,0.25)'},
};
const COLORS_LIST=['#6366f1','#22d3ee','#10b981','#f59e0b','#a855f7','#ec4899','#ef4444','#0ea5e9','#84cc16','#fb923c'];

let students=[],seating=[],isGenerated=false;
let currentPage='dashboard',selectedFloor=1,selectedRoomId=null,uploadAlert='';
let deptColorMap={};

function saveAll(){try{localStorage.setItem('se_s',JSON.stringify(students));localStorage.setItem('se_r',JSON.stringify(seating));localStorage.setItem('se_g',JSON.stringify(isGenerated));}catch(e){}}
function loadAll(){try{const s=localStorage.getItem('se_s');if(s)students=JSON.parse(s);const r=localStorage.getItem('se_r');if(r)seating=JSON.parse(r);const g=localStorage.getItem('se_g');if(g)isGenerated=JSON.parse(g);}catch(e){}}

function getDeptPalette(d){return DEPT_PALETTE[d]||DEPT_PALETTE.DEFAULT;}
function getDeptColor(d){
  if(!deptColorMap[d]){const all=[...new Set(students.map(s=>s.dept))].sort();all.forEach((x,i)=>{if(!deptColorMap[x])deptColorMap[x]=COLORS_LIST[i%COLORS_LIST.length];});}
  return deptColorMap[d]||'#94a3b8';
}
function deptBadge(d){const p=getDeptPalette(d);return `<span class="dept-badge" style="background:${p.bg};color:${p.color};border:1px solid ${p.border};">${d}</span>`;}

const PAGE_META={
  dashboard:{title:'Dashboard',sub:'SmartExam AI — Intelligent Exam Hall Seating System'},
  upload:{title:'Student Upload',sub:'Upload CSV or Excel file with student data'},
  seating:{title:'Seating Layout',sub:'AI-generated floor-wise room allocation'},
  fairness:{title:'AI Fairness Score',sub:'Analysis of department mixing quality'},
  export:{title:'Export Center',sub:'Download seating plans in PDF, Excel, and more'},
};

function go(page){
  currentPage=page;selectedRoomId=null;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nb-'+page);if(nb)nb.classList.add('active');
  document.getElementById('page-title').textContent=PAGE_META[page]?.title||page;
  document.getElementById('page-sub').textContent=PAGE_META[page]?.sub||'';
  render();
}

function render(){
  const c=document.getElementById('content');
  c.className='content fade-in';
  const occupied=seating.reduce((a,r)=>a+r.seats.length,0);
  document.getElementById('topbar-badge').textContent=`${students.length} Students · ${[...new Set(students.map(s=>s.dept))].length} Depts · ${occupied} Seated`;
  const map={dashboard:pageDashboard,upload:pageUpload,seating:pageSeating,fairness:pageFairness,export:pageExport};
  c.innerHTML=(map[currentPage]||pageDashboard)();
  attachEvents();
}

function pageDashboard(){
  const depts=[...new Set(students.map(s=>s.dept))];
  const occupied=seating.reduce((a,r)=>a+r.seats.length,0);
  const roomsUsed=seating.filter(r=>r.seats.length>0).length;
  const pct=TOTAL_CAP>0?Math.round(occupied/TOTAL_CAP*100):0;
  const fs=fairnessScore();
  return `
  <div class="grid4" style="margin-bottom:20px;">
    <div class="stat-card"><div class="stat-glow" style="background:#6366f1;"></div><div class="stat-emoji">👥</div><div class="stat-label">Total Students</div><div class="stat-value" style="color:#a5b4fc;">${students.length}</div><div class="stat-sub">${depts.length} departments</div></div>
    <div class="stat-card"><div class="stat-glow" style="background:#22d3ee;"></div><div class="stat-emoji">🏢</div><div class="stat-label">Total Floors</div><div class="stat-value" style="color:#67e8f9;">${FLOORS}</div><div class="stat-sub">${ROOMS_PER_FLOOR} rooms per floor</div></div>
    <div class="stat-card"><div class="stat-glow" style="background:#10b981;"></div><div class="stat-emoji">🚪</div><div class="stat-label">Rooms Active</div><div class="stat-value" style="color:#34d399;">${roomsUsed}</div><div class="stat-sub">of ${TOTAL_ROOMS} total</div></div>
    <div class="stat-card"><div class="stat-glow" style="background:#f59e0b;"></div><div class="stat-emoji">💺</div><div class="stat-label">Seats Occupied</div><div class="stat-value" style="color:#fbbf24;">${occupied}</div><div class="stat-sub">of ${TOTAL_CAP} capacity</div></div>
  </div>
  <div class="grid2" style="margin-bottom:20px;">
    <div class="card">
      <div class="section-title">Seating Status</div>
      <div style="margin-top:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span style="font-size:13px;color:var(--text2);">Capacity Utilization</span><span style="font-size:14px;font-weight:700;color:var(--neon);font-family:var(--mono);">${pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="margin-top:18px;padding:12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);">

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function interleave(list){
  const byDept={};
  list.forEach(s=>{(byDept[s.dept]=byDept[s.dept]||[]).push(s);});
  Object.values(byDept).forEach(arr=>{for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}});
  const queues=Object.values(byDept).sort((a,b)=>b.length-a.length);
  const result=[];
  while(queues.some(q=>q.length>0)){
    for(const q of queues){
      if(q.length){
        const s=q.shift();
        if(!result.length||result[result.length-1].dept!==s.dept){result.push(s);}
        else{
          let placed=false;
          for(let i=result.length-2;i>=0;i--){if(result[i].dept!==s.dept&&(i===result.length-2||result[i+1].dept!==s.dept)){result.splice(i+1,0,s);placed=true;break;}}
          if(!placed)result.push(s);
        }
      }
    }
  }
  return result;
}

async function generateSeating(){
  if(!students.length){alert('Please upload student data first!');go('upload');return;}

  await new Promise(r=>setTimeout(r,1400));
  deptColorMap={};
  const mixed=interleave(students);
  seating=[];
  let idx=0;
  for(let f=1;f<=FLOORS;f++){for(let r=1;r<=ROOMS_PER_FLOOR;r++){const room={id:`F${f}-R${r}`,floor:f,room:r,seats:[]};for(let s=0;s<SEATS_PER_ROOM&&idx<mixed.length;s++){room.seats.push({...mixed[idx],seatNum:s+1});idx++;}seating.push(room);}}
  isGenerated=true;saveAll();go('seating');
}

function roomFairness(room){
  if(!room.seats.length)return 0;
  const depts=[...new Set(room.seats.map(s=>s.dept))];
  const divScore=Math.round((depts.length/Math.min(room.seats.length,7))*65);
  let adjOk=0;for(let i=0;i<room.seats.length-1;i++){if(room.seats[i].dept!==room.seats[i+1].dept)adjOk++;}
  const adjScore=room.seats.length>1?Math.round((adjOk/(room.seats.length-1))*35):35;
  return Math.min(100,divScore+adjScore);
}
function fairnessScore(){const r=seating.filter(x=>x.seats.length>0);if(!r.length)return 0;return Math.round(r.map(roomFairness).reduce((a,b)=>a+b,0)/r.length);}
function adjViolations(){let v=0;seating.forEach(r=>{for(let i=0;i<r.seats.length-1;i++){if(r.seats[i].dept===r.seats[i+1].dept)v++;}});return v;}

async function handleFile(file){
  const ext=file.name.split('.').pop().toLowerCase();
  if(!['csv','xlsx'].includes(ext)){uploadAlert='<div class="alert alert-error">❌ Only .csv and .xlsx files accepted</div>';render();return;}
  try{
    let rows=[];
    if(ext==='csv'){
      const text=await file.text();
      const lines=text.trim().split(/\r?\n/);
      const hdr=lines[0].split(',').map(h=>h.trim().toLowerCase());
      const ri=hdr.findIndex(h=>h.includes('register')||h==='reg');
      const ni=hdr.findIndex(h=>h.includes('name'));
      const di=hdr.findIndex(h=>h.includes('dept')||h.includes('department'));
      const yi=hdr.findIndex(h=>h.includes('year'));
      for(let i=1;i<lines.length;i++){if(!lines[i].trim())continue;const c=lines[i].split(',').map(x=>x.trim());if(c[ri])rows.push({reg:c[ri],name:c[ni]||'Unknown',dept:(c[di]||'').toUpperCase(),year:c[yi]||'1'});}
    }else{
      const buf=await file.arrayBuffer();const wb=XLSX.read(buf,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const data=XLSX.utils.sheet_to_json(ws);
      rows=data.map(r=>({reg:String(r.RegisterNumber||r['Register Number']||r.Reg||'').trim(),name:String(r.StudentName||r['Student Name']||r.Name||'Unknown').trim(),dept:String(r.Department||r.Dept||'').trim().toUpperCase(),year:String(r.Year||r.year||'1').trim()})).filter(r=>r.reg);
    }
    const existing=new Set(students.map(s=>s.reg));let added=0,dupes=0;
    rows.forEach(r=>{if(existing.has(r.reg)){dupes++;}else{students.push(r);existing.add(r.reg);added++;}});
    saveAll();uploadAlert=`<div class="alert alert-success">✓ Added ${added} students${dupes>0?` · ${dupes} duplicates skipped`:''}</div>`;render();
  }catch(e){uploadAlert=`<div class="alert alert-error">❌ Parse error: ${e.message}</div>`;render();}
}

function exportFullPDF(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  doc.setFontSize(16);doc.setTextColor(40,40,80);doc.text('SmartExam AI — Full Institution Seating Plan',14,16);
  doc.setFontSize(9);doc.setTextColor(100,100,120);doc.text(`Generated: ${new Date().toLocaleString()}  |  Students: ${students.length}  |  Fairness: ${fairnessScore()}%`,14,23);
  const rows=[];seating.forEach(room=>{room.seats.forEach(s=>{rows.push([s.reg,s.name,s.dept,`Floor ${room.floor}`,room.id,`Seat ${s.seatNum}`,`Year ${s.year}`]);});});
  doc.autoTable({startY:28,head:[['Register No','Student Name','Department','Floor','Room','Seat No','Year']],body:rows,styles:{fontSize:7.5,cellPadding:2.5},headStyles:{fillColor:[99,102,241],textColor:255,fontStyle:'bold'},alternateRowStyles:{fillColor:[248,248,255]}});
  doc.save('SmartExam_Full_Seating.pdf');
}
function exportHallPDF(){

  doc.setFontSize(14);doc.setTextColor(40,40,80);doc.text('SmartExam AI — Hall Wise Seating Plan',14,y);y+=10;

    y=doc.lastAutoTable.finalY+10;

function exportDeptPDF(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});let y=20;
  doc.setFontSize(14);doc.setTextColor(40,40,80);doc.text('SmartExam AI — Department Wise Seating Plan',14,y);y+=10;
  const depts=[...new Set(students.map(s=>s.dept))].sort();
  depts.forEach(dept=>{
    if(y>250){doc.addPage();y=14;}
    doc.setFontSize(11);doc.setTextColor(168,85,247);doc.text(`Department: ${dept}  (${students.filter(s=>s.dept===dept).length} students)`,14,y);y+=4;
    const rows=[];seating.forEach(room=>{room.seats.filter(s=>s.dept===dept).forEach(s=>{rows.push([s.reg,s.name,room.id,`Seat ${s.seatNum}`,`Floor ${room.floor}`]);});});
    doc.autoTable({startY:y,head:[['Register No','Student Name','Room','Seat No','Floor']],body:rows,styles:{fontSize:8,cellPadding:2},headStyles:{fillColor:[168,85,247],textColor:255},margin:{left:14,right:14}});
    y=doc.lastAutoTable.finalY+10;
  });
  doc.save('SmartExam_Department_Wise.pdf');
}
function exportExcel(){
  const rows=[];seating.forEach(room=>{room.seats.forEach(s=>{rows.push({RegisterNumber:s.reg,StudentName:s.name,Department:s.dept,Floor:`Floor ${room.floor}`,Room:room.id,SeatNumber:s.seatNum,Year:`Year ${s.year}`});});});
  const ws=XLSX.utils.json_to_sheet(rows);ws['!cols']=[{wch:16},{wch:24},{wch:12},{wch:10},{wch:10},{wch:12},{wch:8}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Seating Plan');
  const depts=[...new Set(students.map(s=>s.dept))];
  const ws2=XLSX.utils.json_to_sheet(depts.map(d=>({Department:d,Students:students.filter(s=>s.dept===d).length,Rooms:seating.filter(r=>r.seats.some(s=>s.dept===d)).length})));
  XLSX.utils.book_append_sheet(wb,ws2,'Dept Summary');XLSX.writeFile(wb,'SmartExam_Seating.xlsx');
}

function attachEvents(){
  const fi=document.getElementById('file-input');if(fi){fi.addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});}
  const uz=document.getElementById('upload-zone');
  if(uz){uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag-over');});uz.addEventListener('dragleave',()=>uz.classList.remove('drag-over'));uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag-over');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});}
  const rd=document.getElementById('room-detail-card');if(rd)setTimeout(()=>rd.scrollIntoView({behavior:'smooth',block:'nearest'}),80);
}
function selFloor(f){selectedFloor=f;selectedRoomId=null;render();}
function selRoom(id){selectedRoomId=selectedRoomId===id?null:id;render();}

loadAll();render();
